# Archivo: nginx.conf
# Descripción: Configuración de Nginx para servir la SPA React en producción (Docker).
# ¿Para qué? Configurar correctamente el servidor para enrutamiento del lado del cliente,
#            compresión gzip y caché de assets estáticos.
# ¿Impacto? Sin try_files /index.html, refrescar una ruta como /dashboard devuelve 404
#           porque Nginx busca el archivo literalmente en el sistema de archivos.

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ¿Qué? Compresión gzip para reducir el tamaño de transferencia.
    # ¿Para qué? Mejora el tiempo de carga inicial — especialmente en bundles JS/CSS de React.
    # ¿Impacto? Los bundles de Vite pueden ser varios cientos de KB; gzip los reduce ~70%.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ¿Qué? Enrutamiento SPA — toda ruta no encontrada como archivo sirve index.html.
    # ¿Para qué? React Router maneja las rutas en el cliente, no el servidor.
    # ¿Impacto? Sin esto, recargar /login o /dashboard en el navegador devuelve 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ¿Qué? Cache-Control para index.html — nunca cachear.
    # ¿Para qué? El navegador siempre solicita el HTML actualizado en cada visita.
    # ¿Impacto? Si index.html se cachea, los usuarios pueden ejecutar versiones desactualizadas
    #           que referencian assets con hashes obsoletos → errores 404 en JS/CSS.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ¿Qué? Caché agresivo (1 año) para assets con hash en el nombre (JS, CSS, imágenes).
    # ¿Para qué? Vite incluye hash de contenido en los nombres de archivo — son inmutables.
    #            Cachear 1 año mejora significativamente la performance en visitas repetidas.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ¿Qué? Ocultar la versión de Nginx en cabeceras y páginas de error.
    # ¿Para qué? Reducir superficie de ataque — no exponer información del servidor al atacante.
    server_tokens off;
}
